services:
  - type: web
    name: chittsaathi-backend
    runtime: node
    rootDir: Backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_SERVICE
        sync: false
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: BACKEND_API_URL
        sync: false
      - key: ML_SERVICE_URL
        sync: false

  - type: web
    name: chittsaathi-ml
    runtime: python
    rootDir: Backend/MoodModel
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fastapi_app:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
